name: Guard non-deployable registry

on:
  push:
  pull_request:

jobs:
  contract-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify repo.contract.v1.json
        run: node scripts/contract-verify.js
